<style id="course-alignment-revision-styles">
.feedbackReport{
  margin-top:18px;

}

  border:2px solid var(--line);
  border-radius:18px;

}
.feedbackCase h3{
  margin:0;

}
.caseReport section{
  display:grid;

  margin:0;

  font-weight:1000;
  letter-spacing:-.03em;
}
.feedbackMeta,
.feedbackText{
  margin:6px 0;
  font-size:13px;
  line-height:1.4;
  font-weight:850;
  color:#2e3746;
}
.feedbackClues{
  margin:9px 0 0;
  padding-left:18px;
  font-size:13px;
  line-height:1.4;
  font-weight:850;
}
.feedbackClues li{margin:5px 0}
.reportObjectList,
.reportSuspectList{
  display:grid;

}
.reportObjectBlock,

  display:grid;

.reportSuspectItem{

  margin:8px 10px 10px 0;

}
.caseReport .setWrap{
  justify-content:flex-start;

}
.caseReport .setItems{
  justify-content:flex-start;

.clueReport{

  background:#fff;

// The seed is based on date+time down to milliseconds and is not shown to players.
const SEED_STRING = new Date().toISOString() + '|' + Date.now();

function xmur3(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function() {
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^= h >>> 16) >>> 0;
  };
}
function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };

function rand() { return rng(); }

  const a = arr.slice();

  const n = M[0].length - 1;
  const piv = pivotColumns(M).filter(j => j < n);
  const free = [];
  for (let j=0; j<n; j++) if (!piv.includes(j)) free.push(j+1);

function classifyAug(M) {
  const n = M[0].length - 1;
  const A = M.map(row => row.slice(0, n));
  const rA = rank(A);
  const rAug = rank(M);
  if (rA < rAug) return 'none';
  return rA === n ? 'one' : 'inf';
}
function classText(cls) {
  return cls === 'none' ? 'no solution' : cls === 'one' ? 'unique solution' : 'infinitely many';
}
function freeVarText(M) {
  const free = freeVariablesFromAug(M).map(j => 'x' + j);
  return free.length ? free.join(', ') : 'none';
}
function rankCompareHTML(M) {
  const n = M[0].length - 1;
  const A = M.map(row => row.slice(0,n));
  return `<span class="mono">rank(A)=${rank(A)}, rank([A|b])=${rank(M)}, variables=${n}</span>`;

  return colsToMatrix([c, scaleVec(2,c), scaleVec(-1,c)]);
}
function makeRank2_3x3() {
  const [c1,c2] = randomIndependentColumnPair(3);
  return colsToMatrix([c1,c2,addVec(c1,c2)]);
}
function makeLineUnique() {
  const x = randInt(-3,3), y = randInt(-3,3);
  let A;
  do {
    A = [[signedSmall(true), signedSmall(false)],[signedSmall(false), signedSmall(true)]];
  } while (rank(A) !== 2);
  const b = matVec(A, [x,y]);
  return augment(A,b);
}
function makeLineNoSolution() {
  const a = signedSmall(true), b = signedSmall(true), c = randInt(-4,4);
  const k = choice([-3,-2,2,3]);
  return [[a,b,c],[k*a,k*b,k*c + signedSmall(true)]];
}
function makeLineSameLine() {
  const a = signedSmall(true), b = signedSmall(true), c = randInt(-4,4);
  const k = choice([-3,-2,2,3]);
  return [[a,b,c],[k*a,k*b,k*c]];
}
function coefficientMatrix(M) {
  return M.map(row => row.slice(0,-1));
}

function systemQuestionBank(good, bad, crimeKind='generic') {
  const n = good[0].length - 1;
  const gSplit = splitAug(good), bSplit = splitAug(bad);
  return [
    question('Compute <span class="mono">REF([A | b])</span>.',
      {A:oneREFHTML(good, {augCol:n}), B:oneREFHTML(bad, {augCol:n})}, 'decisive'),
    question('Compute <span class="mono">RREF([A | b])</span>.',
      {A:rrefHTML(good, {augCol:n}), B:rrefHTML(bad, {augCol:n})}, 'decisive'),
    question('Compute <span class="mono">rank(A)</span>, <span class="mono">rank([A | b])</span>, and the number of variables.',
      {A:rankCompareHTML(good), B:rankCompareHTML(bad)}, 'decisive', {live:false, auditTag:'review-leave-out'}),
    question('List the pivot columns of <span class="mono">[A | b]</span>.',
      {A:'columns <span class="mono">' + listCols(pivotColumns(good)) + '</span>', B:'columns <span class="mono">' + listCols(pivotColumns(bad)) + '</span>'}, 'decisive'),
    question('Show the contradiction row, if any.',

    question('Compute <span class="mono">rank([A | b])</span> only.',

const CASE_GENERATORS = ACTIVE_CASE_GENERATORS;
const CHALLENGE_CASE_GENERATORS = [];

const state = {
  mode:'start',
  level:'single',
  timeLeft:ROUND_SECONDS,
  timerId:null,
  score:0,
  attempted:0,
  deck:[],
  current:null,
  history:[],
  caseLog:[],
  caseLogs:[],
  restartConfirmOpen:false
};

function activeGenerators() {
  return ACTIVE_CASE_GENERATORS;
}

function levelName() {
  return 'Single mode';
}

function clueLimit() {
  return 1;
}

function refillDeck() {
  const gens = activeGenerators();
  state.deck = shuffle(Array.from({length:gens.length}, (_, i) => i));
}
function nextCaseObject() {
  const gens = activeGenerators();
  if (!state.deck.length) refillDeck();
  const idx = state.deck.pop();
  return gens[idx]();
}
function makePlayState(caseObj) {
  return {
    caseObj,
    askedIndex:null,
    revealed:new Set(),
    usedWrong:new Set(),
    clueLog:[],
    prematureConvictions:[],

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function renderRuleDot(used) {
  return `<span class="ruleDot ${used ? '' : 'live'}"></span>`;
}
function renderEvidence(evidence) {
  if (!evidence || !evidence.length) return '';
  return `<div class="evidenceRow">${evidence.map(item => `
    <div class="evidenceCard">
      <div class="evidenceLabel">${item.label}</div>
      <div class="objWrap">${item.html}</div>
    </div>`).join('')}</div>`;
}
function suspectLabel(letter) {
  if (letter === 'A') return '1';
  if (letter === 'B') return '2';
  return '';
}
function displayExplanation(text) {
  return text
    .replaceAll('Suspect A', 'Suspect 1')
    .replaceAll('Suspect B', 'Suspect 2');
}

function aliasForCase(caseObj) {
  const crime = stripTags(caseObj.crime || '').toLowerCase();
  const title = (caseObj.title || '').toLowerCase();
  const html = caseObj.suspects?.A?.html || '';
  if (title.includes('duplicate predictions')) return {kind:'pair', symbols:['c', 'c′']};
  if (html.includes('setWrap')) return {kind:'single', symbol:'V', vector:false};
  if (html.includes('augmented')) return {kind:'single', symbol:'M', vector:false};
  if (crime.includes('col(a)')) return {kind:'single', symbol:'b', vector:true};
  if ((crime.includes('null(a)') && (crime.startsWith('being in') || crime.startsWith('being outside'))) || title.includes('noisy direction')) return {kind:'single', symbol:'z', vector:true};
  if (crime.includes('same-output difference') || title.includes('same-output change')) return {kind:'single', symbol:'d', vector:true};
  return {kind:'single', symbol:'B', vector:false};
}
function indexedHTML(symbol, idx, isVector=false) {
  const cls = isVector ? 'vec' : 'mono';
  return `<span class="${cls}">${symbol}</span><sup>(${idx})</sup>`;
}
function aliasHTML(alias, letter) {
  const idx = suspectLabel(letter);
  if (alias.kind === 'pair') {
    return alias.symbols.map(sym => indexedHTML(sym, idx, true)).join(', ');
  }
  return indexedHTML(alias.symbol, idx, !!alias.vector);
}
function aliasChip(caseObj, letter) {
  return `<div class="aliasChip">[alias: ${aliasHTML(aliasForCase(caseObj), letter)}]</div>`;
}
function aliasSymbolsForQuestions() {
  return {
    z: '<span class="vec">z</span><sup>(i)</sup>',
    b: '<span class="vec">b</span><sup>(i)</sup>',
    d: '<span class="vec">d</span><sup>(i)</sup>',
    c: '<span class="vec">c</span><sup>(i)</sup>',
    cp: '<span class="vec">c′</span><sup>(i)</sup>',
    B: '<span class="mono">B<sup>(i)</sup></span>',
    M: '<span class="mono">M<sup>(i)</sup></span>',
    C: '<span class="mono">C<sup>(i)</sup></span>',
    V: '<span class="mono">V<sup>(i)</sup></span>'
  };
}
function addConstruction(label, construction) {
  if (label.includes('where')) return label;
  return label.replace(/\.$/, '') + `, where ${construction}.`;
}
function aliasQuestionLabel(label, caseObj) {
  const alias = aliasForCase(caseObj);
  const S = aliasSymbolsForQuestions();
  let out = label;

  if (alias.kind === 'pair') {
    out = out
      .replaceAll('Compute the two prediction vectors.', `Compute <span class="mono">X</span>${S.c} and <span class="mono">X</span>${S.cp}.`)
      .replaceAll('<span class="mono">X(c-c′)</span>', `<span class="mono">X(</span>${S.c} − ${S.cp}<span class="mono">)</span>`)
      .replaceAll('<span class="mono">X<sup>T</sup>c - X<sup>T</sup>c′</span>', `<span class="mono">X<sup>T</sup></span>${S.c} − <span class="mono">X<sup>T</sup></span>${S.cp}`)
      .replaceAll('<span class="mono">c-c′</span>', `${S.c} − ${S.cp}`)
      .replaceAll('<span class="mono">c⋅c′</span>', `${S.c} ⋅ ${S.cp}`)
      .replaceAll('<span class="mono">X<sup>T</sup>c</span>', `<span class="mono">X<sup>T</sup></span>${S.c}`)
      .replaceAll('<span class="mono">c</span>', S.c)
      .replaceAll('<span class="mono">c′</span>', S.cp);
    return out;
  }

  if (alias.symbol === 'z') {
    out = out.replaceAll('<span class="vec">z</span>', '__Z__');
    out = out
      .replaceAll('<span class="mono">A__Z__</span>', '<span class="mono">A</span>__Z__')
      .replaceAll('<span class="mono">A<sup>T</sup>__Z__</span>', '<span class="mono">A<sup>T</sup></span>__Z__')
      .replaceAll('__Z__', S.z);
    return out;
  }

  if (alias.symbol === 'b') {
    out = out.replaceAll('<span class="vec">b</span>', '__BV__');
    out = out
      .replaceAll('[A | b]', `[A | __BV__]`)
      .replaceAll('<span class="mono">A__BV__</span>', '<span class="mono">A</span>__BV__')
      .replaceAll('<span class="mono">A<sup>T</sup>__BV__</span>', '<span class="mono">A<sup>T</sup></span>__BV__')
      .replaceAll('<span class="mono">b<sup>T</sup>b</span>', '__BV__<sup>T</sup>__BV__')
      .replaceAll('b₃', '__BV__<sub>3</sub>')
      .replaceAll('b₁', '__BV__<sub>1</sub>')
      .replaceAll('b₂', '__BV__<sub>2</sub>')
      .replaceAll('__BV__', S.b);
    return out;
  }

  if (alias.symbol === 'd') {
    out = out.replaceAll('<span class="vec">d</span>', '__D__');
    out = out
      .replaceAll('<span class="mono">A__D__</span>', '<span class="mono">A</span>__D__')
      .replaceAll('<span class="mono">A<sup>T</sup>__D__</span>', '<span class="mono">A<sup>T</sup></span>__D__')
      .replaceAll('__D__', S.d);
    return out;
  }

  if (alias.symbol === 'M') {
    out = out
      .replaceAll('<span class="mono">REF([A | b])</span>', `<span class="mono">REF</span>(${S.M})`)
      .replaceAll('<span class="mono">RREF([A | b])</span>', `<span class="mono">RREF</span>(${S.M})`)
      .replaceAll('<span class="mono">[A | b]</span>', S.M)
      .replaceAll('[A | b]', `M<sup>(i)</sup>`)
      .replaceAll('<span class="mono">rank([A | b])</span>', `<span class="mono">rank</span>(${S.M})`)
      .replaceAll('<span class="mono">rank(A)</span>', `<span class="mono">rank</span>(${S.B})`)
      .replaceAll('<span class="mono">RREF(A)</span>', `<span class="mono">RREF</span>(${S.B})`)
      .replaceAll('<span class="mono">A<sup>T</sup>b</span>', `${S.B}<sup>T</sup><span class="vec">b</span><sup>(i)</sup>`)
      .replaceAll('<span class="mono">det(A)</span>', `<span class="mono">det</span>(${S.B})`)
      .replaceAll('row sums of <span class="mono">A</span>', `row sums of ${S.B}`)
      .replaceAll('Solve the system by row reduction.', `Solve the system represented by ${S.M} by row reduction.`);
    if (out.includes(S.B) || out.includes('<span class="vec">b</span><sup>(i)</sup>')) {
      out = addConstruction(out, `${S.M} = [${S.B} | <span class="vec">b</span><sup>(i)</sup>]`);
    }
    return out;
  }

  if (alias.symbol === 'V') {
    const rows = stripTags(caseObj.crime || '').toLowerCase().includes('row(a)') || (caseObj.title || '').toLowerCase().includes('row-space');
    const construction = `${S.C} has the vectors in ${S.V} as ${rows ? 'rows' : 'columns'}`;
    out = out
      .replaceAll('<span class="mono">rank(C)</span>', `<span class="mono">rank</span>(${S.C})`)
      .replaceAll('<span class="mono">RREF(C)</span>', `<span class="mono">RREF</span>(${S.C})`)
      .replaceAll('<span class="mono">C<span class="vec">x</span> = 0</span>', `${S.C}<span class="vec">x</span> = 0`)
      .replaceAll('<span class="mono">C<span class="vec">x</span></span>', `${S.C}<span class="vec">x</span>`)
      .replaceAll('<span class="mono">C<sup>T</sup>C</span>', `${S.C}<sup>T</sup>${S.C}`)
      .replaceAll('<span class="mono">AC</span>', `<span class="mono">A</span>${S.C}`)
      .replaceAll('<span class="mono">CA</span>', `${S.C}<span class="mono">A</span>`)
      .replaceAll('<span class="mono">[A C]</span>', `<span class="mono">[A </span>${S.C}<span class="mono">]</span>`)
      .replaceAll('<span class="mono">rank([A C])</span>', `<span class="mono">rank([A </span>${S.C}<span class="mono">])</span>`)
      .replaceAll('rows of <span class="mono">A</span> and <span class="mono">C</span>', `rows of <span class="mono">A</span> and ${S.C}`)
      .replaceAll('where columns of <span class="mono">C</span> are the suspect vectors', `where ${construction}`)
      .replaceAll('where rows of <span class="mono">C</span> are the suspect vectors', `where ${construction}`)
      .replaceAll('where <span class="mono">C</span> is the suspect matrix', `where ${construction}`)
      .replaceAll('where <span class="mono">C</span> has the suspect vectors as columns', `where ${construction}`)
      .replaceAll('where <span class="mono">C</span> has the suspect vectors as rows', `where ${construction}`)
      .replaceAll('where <span class="mono">C</span> has the vectors in <span class="mono">V<sup>(i)</sup></span> as columns', `where ${construction}`)
      .replaceAll('where <span class="mono">C</span> has the vectors in <span class="mono">V<sup>(i)</sup></span> as rows', `where ${construction}`);
    if (out.includes(S.C) && !out.includes('where')) out = addConstruction(out, construction);
    return out;
  }

  if (alias.symbol === 'B') {
    let bOut = out
      .replaceAll('<span class="mono">rank(A)</span>', `<span class="mono">rank</span>(${S.B})`)
      .replaceAll('<span class="mono">nullity(A)</span>', `<span class="mono">nullity</span>(${S.B})`)
      .replaceAll('<span class="mono">RREF(A)</span>', `<span class="mono">RREF</span>(${S.B})`)
      .replaceAll('<span class="mono">REF(A)</span>', `<span class="mono">REF</span>(${S.B})`)
      .replaceAll('<span class="mono">det(A)</span>', `<span class="mono">det</span>(${S.B})`)
      .replaceAll('<span class="mono">trace(A)</span>', `<span class="mono">trace</span>(${S.B})`)
      .replaceAll('the sum of all entries of <span class="mono">A</span>', `the sum of all entries of ${S.B}`)
      .replaceAll('the first row sum', `the first row sum of ${S.B}`)
      .replaceAll('the column sums', `the column sums of ${S.B}`)
      .replaceAll('column sums', `column sums of ${S.B}`)
      .replaceAll('row sums', `row sums of ${S.B}`)
      .replaceAll('all entries are nonzero', `all entries of ${S.B} are nonzero`)
      .replaceAll('<span class="mono">A<sup>T</sup>A</span>', `${S.B}<sup>T</sup>${S.B}`)
      .replaceAll('<span class="mono">A[1,1,−1]<sup>T</sup></span>', `${S.B}<span class="mono">[1,1,−1]<sup>T</sup></span>`)
      .replaceAll('<span class="mono">A<span class="vec">x</span> = 0</span>', `${S.B}<span class="vec">x</span> = 0`)
      .replaceAll('<span class="mono">A e₃</span>', `${S.B}<span class="mono">e₃</span>`)
      .replaceAll('<span class="mono">B e₃</span>', `${S.B}<span class="mono">e₃</span>`)
      .replaceAll('<span class="mono">B u</span>', `${S.B}<span class="mono">u</span>`)
      .replaceAll('<span class="mono">B(u+e₃)</span>', `${S.B}<span class="mono">(u+e₃)</span>`)
      .replaceAll('<span class="mono">B<sup>T</sup>e₁</span>', `${S.B}<sup>T</sup><span class="mono">e₁</span>`)
      .replaceAll('<span class="mono">B<sup>T</sup>B</span>', `${S.B}<sup>T</sup>${S.B}`)
      .replaceAll('<span class="mono">rank(B)</span>', `<span class="mono">rank</span>(${S.B})`)
      .replaceAll('<span class="mono">null(B)</span>', `<span class="mono">null</span>(${S.B})`)
      .replaceAll('<span class="mono">A<span class="vec">x</span></span>', `${S.B}<span class="vec">x</span>`)
      .replaceAll('<span class="mono">A(<span class="vec">x</span>+e₃)</span></span>', `${S.B}<span class="mono">(</span><span class="vec">x</span><span class="mono">+e₃)</span>`)
      .replaceAll('<span class="mono">A<sup>T</sup>e₃</span>', `${S.B}<sup>T</sup><span class="mono">e₃</span>`)
      .replaceAll('<span class="mono">null(A)</span>', `<span class="mono">null</span>(${S.B})`)
      .replaceAll('columns of <span class="mono">A</span>', `columns of ${S.B}`)
      .replaceAll('pivot columns of <span class="mono">A</span>', `pivot columns of ${S.B}`)
      .replaceAll('number of columns of <span class="mono">A</span>', `number of columns of ${S.B}`);
    bOut = bOut
      .replaceAll(`the column sums of ${S.B} of ${S.B}`, `the column sums of ${S.B}`)
      .replaceAll(`column sums of ${S.B} of ${S.B}`, `column sums of ${S.B}`)
      .replaceAll('Compute the sum of all entries.', `Compute the sum of all entries of ${S.B}.`)
      .replaceAll('Compute the number of rows.', `Compute the number of rows of ${S.B}.`)
      .replaceAll('Compute the number of columns.', `Compute the number of columns of ${S.B}.`)
      .replaceAll('Are all columns nonzero?', `Are all columns of ${S.B} nonzero?`)
      .replaceAll('Is column 3 nonzero?', `Is column 3 of ${S.B} nonzero?`);
    return bOut;
  }
  return out;
}

function renderSuspectHead(letter, suspect, caseObj) {
  const color = letter === 'A' ? 'a' : 'b';
  const label = suspectLabel(letter);
  return `
    <div class="suspectCardMini ${color}">
      <div class="susTop">
        <div class="susName">
          <div class="susNameText">Suspect</div>
          <div class="susBadge">${label}</div>
        </div>
      </div>
      ${aliasChip(caseObj, letter)}
      <div class="objWrap">${suspect.html}</div>
    </div>`;
}
function renderQuestionRow(q, idx, playState) {
  const revealed = playState.revealed.has(idx);
  const wrongUsed = playState.usedWrong.has(idx);
  const disabled = playState.resolved || isBlocked(playState) || revealed || wrongUsed;
  const btnClass = revealed ? 'askBtn used' : (disabled ? 'askBtn locked' : 'askBtn');
  return `
    <tr>
      <td class="questionCell">
        <button class="${btnClass}" data-ask="${idx}" ${disabled ? 'disabled' : ''}>
          <span class="qLabel">${aliasQuestionLabel(q.label, playState.caseObj)}</span>
        </button>
      </td>
      <td class="answerCell ${revealed ? '' : 'empty'}">${revealed ? formatAnswerHTML(q.answers.A) : '—'}</td>
      <td class="answerCell ${revealed ? '' : 'empty'}">${revealed ? formatAnswerHTML(q.answers.B) : '—'}</td>
    </tr>`;
}
function formatAnswerHTML(html) {
  return String(html).replace(/\bx(\d+)\b/g, 'x<sub>$1</sub>');
}
function renderProgressDots() {
  const dots = state.history.slice(-12).map(item => `<span class="dot ${item ? 'done' : 'fail'}"></span>`).join('');
  return dots || `<span class="dot now"></span>`;
}

function isBlocked(playState) {
  return playState.blockedUntil && Date.now() < playState.blockedUntil;
}
function hasDecisiveClue(playState) {
  return !!playState && playState.clueLog.some(item => item.kind === 'decisive');
}
function blockSeconds(playState) {
  if (!isBlocked(playState)) return 0;
  return Math.max(1, Math.ceil((playState.blockedUntil - Date.now()) / 1000));
}
function renderBoardNote(playState) {
  if (playState.resolved) return 'Choose a clue. Additional clues become available after 5 seconds.';
  if (isBlocked(playState)) return `<span class="boardNoteBubble">An additional clue can be accessed in ${blockSeconds(playState)} seconds.</span>`;
  if (playState.status === 'An additional clue is available.') return `<span class="boardNoteBubble">${playState.status}</span>`;
  if (playState.status) return playState.status;
  return 'Choose a clue. Additional clues become available after 5 seconds.';
}
function renderJuryWarning(playState) {
  if (!playState.wrongClueMessage) return '';
  return `
    <section class="cluePenalty" role="alertdialog" aria-live="assertive" aria-label="Jury warning">
      <strong>Jury needs evidence</strong>
      <p>${escapeHTML(playState.wrongClueMessage)}</p>

      </div>
    </section>`;
}

function escapeHTML(text) {
  return String(text ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function htmlToReportText(html) {
  if (!html) return '';
  if (typeof document === 'undefined') {
    return stripTags(html).replace(/\s+/g, ' ').replaceAll('−', '-').trim();
  }
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('.matrixFrame[data-plain]').forEach(frame => {
    const pre = document.createElement('pre');
    pre.textContent = frame.getAttribute('data-plain') || '';
    frame.replaceWith(pre);
  });
  div.querySelectorAll('sup').forEach(sup => sup.replaceWith('^(' + sup.textContent + ')'));
  div.querySelectorAll('sub').forEach(sub => sub.replaceWith('_(' + sub.textContent + ')'));
  return (div.textContent || '')
    .replaceAll('−', '-')
    .replace(/\n{3,}/g, '\n\n')
    .replace(/[ \t]+\n/g, '\n')
    .replace(/[ \t]{2,}/g, ' ')
    .trim();
}
function reportAccuracy() {
  return state.attempted ? Math.round(100 * state.score / state.attempted) : 0;
}
function recordCaseOutcome(playState, decisionLetter) {
  if (!playState || playState.reported) return;
  const c = playState.caseObj;
  const chosenDisplay = suspectLabel(decisionLetter);
  const guiltyDisplay = suspectLabel(c.guilty);
  const explanationHTML = displayExplanation(c.explanation || '');
  playState.reported = true;
  state.caseLog.push({
    game:'Null & Order',
    seed:SEED_STRING,
    caseId:c.id || slugify(stripTags(c.title || 'case')),
    titleHTML:c.title || '',
    titleText:htmlToReportText(c.title || ''),
    crimeHTML:c.crime || '',
    crimeText:htmlToReportText(c.crime || ''),
    evidenceHTML:(c.evidence || []).map(e => ({
      label:e.label,
      html:e.html,
      text:htmlToReportText(e.html)
    })),
    suspectsHTML:{
      A:c.suspects?.A?.html || '',
      B:c.suspects?.B?.html || ''
    },
    suspectsText:{
      A:htmlToReportText(c.suspects?.A?.html || ''),
      B:htmlToReportText(c.suspects?.B?.html || '')
    },
    chosen:decisionLetter,
    chosenDisplay,
    guilty:c.guilty,
    guiltyDisplay,
    correct:decisionLetter === c.guilty,
    explanationHTML,
    explanationText:htmlToReportText(explanationHTML),
    decisionRule:c.decisionRule || '',
    fastRouteHTML:c.fastRoute || '',
    fastRouteText:htmlToReportText(c.fastRoute || ''),
    clueLog:playState.clueLog.slice(),
    prematureConvictions:(playState.prematureConvictions || []).slice(),
    startedAt:playState.startedAt,
    decidedAt:new Date().toISOString()
  });
  state.caseLogs = state.caseLog;
}
function recordUnresolvedCurrentCase() {
  const p = state.current;
  if (p && !p.resolved && (p.clueLog.length || (p.prematureConvictions || []).length) && !p.reported) recordCaseOutcome(p, null);
}
function buildCaseReportHTML(entry, number) {
  const evidence = entry.evidenceHTML.length ? `
    <section class="reportSection">
      <h4>Evidence</h4>
      <div class="reportObjectList">
        ${entry.evidenceHTML.map(e => `
        <div class="reportObjectBlock">
          <div class="reportObjectLabel">${escapeHTML(e.label)}</div>
          <div class="reportObject">${e.html}</div>
        </div>`).join('')}
      </div>
    </section>` : '';
  return `
    <article class="feedbackCase caseReport">
      <h3>Case ${number}: ${entry.titleHTML}</h3>
      <p class="feedbackMeta"><strong>Crime:</strong> ${entry.crimeHTML}</p>
      ${evidence}
      <section class="reportSection">
        <h4>Suspects</h4>
        <div class="reportSuspectList">
          <div class="reportSuspectItem">
            <div class="reportObjectLabel">Suspect 1</div>
            <div class="reportObject">${entry.suspectsHTML.A}</div>
          </div>
          <div class="reportSuspectItem">
            <div class="reportObjectLabel">Suspect 2</div>
            <div class="reportObject">${entry.suspectsHTML.B}</div>
          </div>
        </div>
      </section>
      <p class="feedbackMeta"><strong>Your decision:</strong> ${entry.chosen ? `Suspect ${entry.chosenDisplay}` : 'No decision recorded'}. <strong>Correct suspect:</strong> Suspect ${entry.guiltyDisplay}. <strong>Result:</strong> ${entry.correct ? 'correct' : 'not correct'}.</p>
      <section class="reportSection">
        <h4>Chosen clue${entry.clueLog.length === 1 ? '' : 's'}</h4>
        ${entry.clueLog.map((clue, j) => `
          <div class="clueReport">
            <p class="clueReportQuestion"><strong>${j + 1}. ${clue.labelHTML}</strong></p>
            <div class="reportAnswer"><strong>Suspect 1:</strong><div class="reportObject">${clue.answersHTML.A}</div></div>
            <div class="reportAnswer"><strong>Suspect 2:</strong><div class="reportObject">${clue.answersHTML.B}</div></div>
            <p><em>${escapeHTML(clue.feedback)}</em></p>
          </div>`).join('')}
      </section>
      ${(entry.prematureConvictions || []).length ? `<p class="feedbackMeta"><strong>Premature conviction attempts:</strong> ${entry.prematureConvictions.length}. A decisive clue was required to convince the jury.</p>` : ''}
      <section class="reportSection">
        <h4>How to decide</h4>
        <p>${entry.explanationHTML}</p>
        <p><strong>Fast route:</strong> ${entry.fastRouteHTML}</p>
      </section>
    </article>`;
}
function buildFinalReportHTML() {
  if (!state.caseLog.length) return '';
  return `<div class="feedbackReport finalReport" id="feedbackReport">
    <h2>Null &amp; Order report</h2>
    <p><strong>Game:</strong> Null &amp; Order</p>
    <p><strong>Seed:</strong> <span class="mono">${escapeHTML(SEED_STRING)}</span></p>
    <p><strong>Cases attempted:</strong> ${state.attempted}</p>
    <p><strong>Score:</strong> ${state.score}</p>
    <p><strong>Accuracy:</strong> ${reportAccuracy()}%</p>
    ${state.caseLog.map((entry, idx) => buildCaseReportHTML(entry, idx + 1)).join('')}
  </div>`;
}
function renderFeedbackReport() {
  return buildFinalReportHTML();
}
function buildReportMarkdown() {
  const lines = [];
  lines.push('# Null & Order report');
  lines.push('');
  lines.push('Game: Null & Order');
  lines.push(`Seed: ${SEED_STRING}`);
  lines.push(`Cases attempted: ${state.attempted}`);
  lines.push(`Score: ${state.score}`);
  lines.push(`Accuracy: ${reportAccuracy()}%`);
  lines.push('');
  state.caseLog.forEach((entry, idx) => {
    lines.push(`## Case ${idx + 1}: ${entry.titleText}`);
    lines.push('');
    lines.push(`Crime: ${entry.crimeText}`);
    lines.push('');
    if (entry.evidenceHTML.length) {
      lines.push('### Evidence');
      entry.evidenceHTML.forEach(e => {
        lines.push(`${e.label}:`);
        lines.push('```text');
        lines.push(e.text);
        lines.push('```');
      });
      lines.push('');
    }
    lines.push('### Suspects');
    lines.push('Suspect 1:');
    lines.push('```text');
    lines.push(entry.suspectsText.A);
    lines.push('```');
    lines.push('Suspect 2:');
    lines.push('```text');
    lines.push(entry.suspectsText.B);
    lines.push('```');
    lines.push('');
    lines.push(`Your decision: ${entry.chosen ? 'Suspect ' + entry.chosenDisplay : 'No decision recorded'}`);
    lines.push(`Correct suspect: Suspect ${entry.guiltyDisplay}`);
    lines.push(`Result: ${entry.correct ? 'correct' : 'not correct'}`);
    lines.push('');
    if ((entry.prematureConvictions || []).length) {
      lines.push(`Premature conviction attempts before a decisive clue: ${entry.prematureConvictions.length}`);
      lines.push('');
    }
    lines.push('### Chosen clues');
    entry.clueLog.forEach((clue, j) => {
      lines.push(`${j + 1}. ${clue.labelText}`);
      lines.push('');
      lines.push('Suspect 1:');
      lines.push('```text');
      lines.push(clue.answersText.A);
      lines.push('```');
      lines.push('Suspect 2:');
      lines.push('```text');
      lines.push(clue.answersText.B);
      lines.push('```');
      lines.push(`Feedback: ${clue.feedback}`);
      lines.push('');
    });
    lines.push('### How to decide');
    if (entry.decisionRule) lines.push(entry.decisionRule);
    if (entry.explanationText) lines.push(entry.explanationText);
    if (entry.fastRouteText) lines.push(`Fast route: ${entry.fastRouteText}`);
    lines.push('');
  });
  return lines.join('\n');
}
function renderEnd() {
  const accuracy = state.attempted ? Math.round(100 * state.score / state.attempted) : 0;
  let praise = 'Nice work!';
  if (state.score >= 10) praise = 'Outstanding work!';
  else if (state.score >= 7) praise = 'Excellent work!';
  else if (state.score <= 2) praise = 'Good start — try again and beat your score!';
  return `
    <header class="top">
      <img class="glassArt" alt="" src="${MAG}" />
      <h1 class="title">Null &amp; Order</h1>
      <p class="subtitle">Time is up. Here is your final score and feedback report.</p>
    </header>
    <div class="endScreen">
      <section class="endCard">
        <div class="endHead">
          <h2>Casebook closed.</h2>
          <div class="bigScore">${state.score}</div>
        </div>
        <div class="endBody">
          <div class="summaryGrid">
            <div class="summaryBox"><span>Final score</span><b>${state.score}</b></div>
            <div class="summaryBox"><span>Cases attempted</span><b>${state.attempted}</b></div>
            <div class="summaryBox"><span>Accuracy</span><b>${accuracy}%</b></div>
          </div>
          <p>${praise}</p>
          <p>You solved <strong>${state.score}</strong> case${state.score === 1 ? '' : 's'} before the timer ran out.</p>
          <div class="seedBox">Game: Null &amp; Order<br>Seed: ${escapeHTML(SEED_STRING)}</div>
          <div class="endBtns">
            <button class="btn gold startBtn" id="restartBtn">Play again</button>
          </div>
          ${renderFeedbackReport()}
        </div>
      </section>
    </div>`;
}

function render() {
  const app = document.getElementById('game');
  if (state.mode === 'start') app.innerHTML = renderStart();
  else if (state.mode === 'play') app.innerHTML = renderCase();
  else app.innerHTML = renderEnd();
  bindEvents();
}
function bindEvents() {
  const startBtn = document.getElementById('startBtn');
  if (startBtn) startBtn.addEventListener('click', () => startRound());
  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', () => returnToIntro());
  const restartRoundBtn = document.getElementById('restartRoundBtn');
  if (restartRoundBtn) restartRoundBtn.addEventListener('click', openRestartConfirm);
  const cancelRestartBtn = document.getElementById('cancelRestartBtn');
  if (cancelRestartBtn) cancelRestartBtn.addEventListener('click', closeRestartConfirm);
  const confirmRestartBtn = document.getElementById('confirmRestartBtn');
  if (confirmRestartBtn) confirmRestartBtn.addEventListener('click', returnToIntro);
  const restartOverlay = document.getElementById('restartOverlay');
  if (restartOverlay) restartOverlay.addEventListener('click', (event) => {
    if (event.target === restartOverlay) closeRestartConfirm();
  });
  const dismissPenaltyBtn = document.getElementById('dismissPenaltyBtn');
  if (dismissPenaltyBtn) dismissPenaltyBtn.addEventListener('click', dismissPenalty);
  document.querySelectorAll('[data-ask]').forEach(btn => btn.addEventListener('click', () => askQuestion(Number(btn.dataset.ask))));
  const guiltyA = document.getElementById('guiltyA');
  const guiltyB = document.getElementById('guiltyB');
  if (guiltyA) guiltyA.addEventListener('click', () => decide('A'));
  if (guiltyB) guiltyB.addEventListener('click', () => decide('B'));
  const nextCaseBtn = document.getElementById('nextCaseBtn');
  if (nextCaseBtn) nextCaseBtn.addEventListener('click', () => {
    if (state.timeLeft <= 0) endRound();
    else {
      state.current = makePlayState(nextCaseObject());
      render();
    }
  });
}

function startRound() {
  if (state.timerId) clearInterval(state.timerId);
  state.mode = 'play';
  state.level = 'single';
  state.timeLeft = ROUND_SECONDS;
  state.score = 0;
  state.attempted = 0;
  state.history = [];
  state.caseLog = [];
  state.caseLogs = state.caseLog;
  state.restartConfirmOpen = false;
  state.deck = [];
  refillDeck();
  state.current = makePlayState(nextCaseObject());
  state.timerId = setInterval(() => {
    state.timeLeft -= 1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      endRound();
    } else {
      render();
    }
  }, 1000);
  render();
}

function endRound() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
  recordUnresolvedCurrentCase();
  state.mode = 'end';
  state.restartConfirmOpen = false;
  render();
}
function openRestartConfirm() {
  state.restartConfirmOpen = true;
  render();
}
function closeRestartConfirm() {
  state.restartConfirmOpen = false;
  render();
}
function returnToIntro() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
  state.mode = 'start';
  state.timeLeft = ROUND_SECONDS;
  state.score = 0;
  state.attempted = 0;
  state.deck = [];
  state.current = null;
  state.history = [];
  state.caseLog = [];
  state.caseLogs = state.caseLog;
  state.restartConfirmOpen = false;
  render();
}
function askQuestion(index) {
  const p = state.current;
  if (p.resolved || isBlocked(p) || p.usedWrong.has(index) || p.revealed.has(index)) return;
  const q = p.caseObj.questions[index];
  const labelHTML = aliasQuestionLabel(q.label, p.caseObj);
  const answerAHTML = formatAnswerHTML(q.answers.A);
  const answerBHTML = formatAnswerHTML(q.answers.B);
  const feedback = q.kind === 'decisive'
    ? 'Useful clue. This clue was enough to decide the case.'
    : (q.why || wrongClueReason(q.label, q.kind));
  p.askedIndex = index;
  p.revealed.add(index);
  p.clueLog.push({
    index,
    label:q.label,
    labelHTML,
    labelText:htmlToReportText(labelHTML),
    kind:q.kind,
    answers:q.answers,
    answersHTML:{A:answerAHTML, B:answerBHTML},
    answersText:{A:htmlToReportText(answerAHTML), B:htmlToReportText(answerBHTML)},
    feedback,
    why:q.why || '',
    selectedAt:new Date().toISOString()
  });

  if (q.kind === 'decisive') {
    p.usableClues += 1;
    p.status = 'Choose a suspect when ready.';
  } else {
    p.usedWrong.add(index);
    p.status = 'Choose a suspect when ready.';
  }
  if (p.revealed.size < p.caseObj.questions.length) {
    const token = Date.now() + ':' + Math.random();
    p.blockToken = token;
    p.blockedUntil = Date.now() + 5000;
    setTimeout(() => {
      if (state.mode === 'play' && state.current === p && p.blockToken === token && !p.resolved) {
        p.blockedUntil = 0;
        p.blockToken = null;
        p.status = 'An additional clue is available.';
        render();
      }
    }, 5050);
  }
  render();
}

function dismissPenalty() {
  const p = state.current;
  if (!p) return;
  p.wrongClueMessage = '';
  render();
}

function stripTags(html) {
  if (typeof document !== 'undefined') {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return (tmp.textContent || tmp.innerText || '').trim();
  }
  return String(html).replace(/<[^>]*>/g, '').trim();
}
function decide(letter) {
  const p = state.current;
  if (!p || p.resolved) return;
  if (!hasDecisiveClue(p)) {
    p.prematureConvictions.push({
      letter,
      at:new Date().toISOString()
    });
    p.status = '';
    p.wrongClueMessage = 'A decisive clue is needed to convince the jury. Choose a clue whose result is enough to decide the crime.';
    render();
    return;
  }
  p.resolved = true;
  p.correct = letter === p.caseObj.guilty;
  state.attempted += 1;
  if (p.correct) state.score += 1;
  state.history.push(p.correct);
  recordCaseOutcome(p, letter);
  p.status = p.correct ? 'Case closed.' : 'Case closed — the wrong suspect was chosen.';
  render();
}

function boot() {
  state.mode = 'start';
  state.level = 'single';
  state.timeLeft = ROUND_SECONDS;
  state.timerId = null;
  state.score = 0;
  state.attempted = 0;
  state.deck = [];
  state.current = null;
  state.history = [];
  state.caseLog = [];
  state.caseLogs = state.caseLog;
  state.restartConfirmOpen = false;
  render();
}

function smokeTestCases(iterations=200) {
  const banned = /trace|row sums|column sums|total sum|sum of entries|number of rows|number of columns|compare the entries/i;
  for (let i = 0; i < iterations; i++) {
    for (const gen of ACTIVE_CASE_GENERATORS) {
      const c = gen();
      if (!c.id) throw new Error(`${gen.name} missing id`);
      if (!c.decisionRule) throw new Error(`${gen.name} missing decisionRule`);
      if (!c.fastRoute) throw new Error(`${gen.name} missing fastRoute`);
      if (!Array.isArray(c.questions) || c.questions.length !== 4) {
        throw new Error(`${gen.name} must produce exactly 4 live clues`);
      }
      if (!c.questions.some(q => q.kind === 'decisive')) {
        throw new Error(`${gen.name} has no decisive clue`);
      }
      for (const q of c.questions) {
        const label = stripTags(q.label);
        if (q.live === false) throw new Error(`${gen.name} selected live=false clue: ${label}`);
        if (q.kind === 'decisive' && clueIsPedagogicallyWeak(q)) {
          throw new Error(`${gen.name} selected weak decisive clue: ${label}`);
        }
        if (clueIsPedagogicallyWeak(q) && !q.allowWeak) {
          throw new Error(`${gen.name} selected weak clue without allowWeak: ${label}`);
        }
        if (banned.test(label)) throw new Error(`${gen.name} has banned clue: ${label}`);
      }
    }
  }
  return true;
}

function smokeTestSpecificFixes() {
  const ns = caseNullspaceBasis();
  if (ns.questions.some(q => /free variables/i.test(stripTags(q.label)) && q.kind === 'decisive')) {
    throw new Error('Free variables alone must not be decisive for null-space basis.');
  }
  if (!ns.questions.some(q => /AC|rank\(C\)|RREF\(C\)/i.test(stripTags(q.label)) && q.kind === 'decisive')) {
    throw new Error('Null-space basis needs a decisive membership + independence clue.');
  }
  const inf = caseInfiniteSolutions();
  if (inf.questions.some(q => /^List free variables/i.test(stripTags(q.label)))) {
    throw new Error('Infinite-solutions case must not list free variables without consistency check.');
  }
  if (!/RREF\(\[A \| z\]\)/.test(caseNullMembership.toString())) {
    throw new Error('Hidden direction missing the reviewed RREF([A | z]) role-error clue.');
  }
  if (!/RREF\(\[A \| z\]\)/.test(caseOutsideNull.toString())) {
    throw new Error('Outside-null direction missing the reviewed RREF([A | z]) role-error clue.');
  }
  const redundant = caseRedundantColumn();
  if (!/linearly dependent columns/i.test(stripTags(redundant.crime))) {
    throw new Error('Redundant-column case was not renamed.');
  }
  const height = caseMapForgetsHeight();
  if (/null\(A\)/.test(stripTags(height.crime)) && /B/.test(stripTags(height.suspects.A.html))) {
    throw new Error('Null-height direction crime should not say null(A) when suspects are B matrices.');
  }
  if (/A e₃|null\(A\)|A<sup>T<\/sup>e₃/.test(caseMapForgetsHeight.toString())) {
    throw new Error('Null-height direction still contains old A-based clue text.');
  }
  if (!/u=\[1,0,1\]/.test(caseSameOutputDifference.toString())) {
    throw new Error('Same-output case must use the fixed u=[1,0,1]^T comparison.');
  }
  if (!/X<sup>T<\/sup>c - X<sup>T<\/sup>c′/.test(caseSamePredictions.toString())) {
    throw new Error('Duplicate-predictions transpose-difference clue missing.');
  }
  const line = caseTwoLinesPoint();
  if (line.questions.some(q => /number of variables|left sides/i.test(stripTags(q.label)))) {
    throw new Error('Line case still exposes a removed rank-count or left-side-only clue.');
  }
  const sys = caseUniqueSolution();
  if (sys.questions.some(q => /rank\(A\).*number of variables|rank\(\[A \| b\]\) only/i.test(stripTags(q.label)))) {
    throw new Error('System case still exposes a removed rank-count/rank-only clue.');
  }
  const fakeReport = buildReportMarkdown();
  if (/\b\d{5,}-\d+\b/.test(fakeReport)) {
    console.warn('Possible collapsed matrix/vector formatting in Markdown report.');
  }
  return true;
}

function smokeTestDecisiveConvictionRule() {
  const saved = {
    mode:state.mode,
    current:state.current,
    score:state.score,
    attempted:state.attempted,
    history:state.history.slice(),
    caseLog:state.caseLog.slice(),
    caseLogs:state.caseLogs
  };
  const p = makePlayState(caseNullMembership());
  state.mode = 'play';
  state.current = p;
  state.score = 0;
  state.attempted = 0;
  state.history = [];
  state.caseLog = [];
  state.caseLogs = state.caseLog;
  decide('A');
  if (p.resolved) throw new Error('Case resolved before a decisive clue was selected.');
  if (state.attempted !== 0 || state.score !== 0 || state.history.length !== 0) {
    throw new Error('Premature conviction changed score, attempts, or history.');
  }
  if (p.status) {
    throw new Error('Premature conviction warning should not be placed in the clue-table header.');
  }
  if (!p.wrongClueMessage || !/convince the jury/i.test(p.wrongClueMessage)) {
    throw new Error('Premature conviction warning did not appear.');
  }
  if (!p.prematureConvictions || p.prematureConvictions.length !== 1) {
    throw new Error('Premature conviction attempt was not logged.');
  }
  state.mode = saved.mode;
  state.current = saved.current;
  state.score = saved.score;
  state.attempted = saved.attempted;
  state.history = saved.history;
  state.caseLog = saved.caseLog;
  state.caseLogs = saved.caseLogs;
  render();
  return true;
}

function smokeTestPlayAgainReturnsToIntro() {
  const saved = {
    mode:state.mode,
    current:state.current,
    score:state.score,
    attempted:state.attempted,
    deck:state.deck.slice(),
    history:state.history.slice(),
    caseLog:state.caseLog.slice(),
    caseLogs:state.caseLogs,
    timerId:state.timerId,
    timeLeft:state.timeLeft
  };
  if (state.timerId) clearInterval(state.timerId);
  state.timerId = null;
  state.mode = 'end';
  render();
  const btn = document.getElementById('restartBtn');
  if (!btn) throw new Error('Play again button missing on final page.');
  btn.click();
  if (state.mode !== 'start') throw new Error('Play again should return to the intro page.');
  if (!document.getElementById('startBtn')) throw new Error('Intro Start game button missing after Play again.');
  if (state.timerId) clearInterval(state.timerId);
  state.mode = saved.mode;
  state.current = saved.current;
  state.score = saved.score;
  state.attempted = saved.attempted;
  state.deck = saved.deck;
  state.history = saved.history;
  state.caseLog = saved.caseLog;
  state.caseLogs = saved.caseLogs;
  state.timerId = saved.timerId;
  state.timeLeft = saved.timeLeft;
  render();
  return true;
}

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && state.restartConfirmOpen) closeRestartConfirm();
});
boot();
