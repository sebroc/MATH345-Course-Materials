<title>Matrix dominoes — minimal shape game</title>
<style>
:root{
  --tile:86px;
  --ink:#111827;
  --muted:#64748b;
  --line:#e5e7eb;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#2563eb;
  --shadow:0 24px 80px rgba(15,23,42,.22);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100%;
  display:grid;
  place-items:center;
  padding:10px 8px 40px;
  color:var(--ink);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 7% 12%, #fde68a 0 72px, transparent 150px),
    radial-gradient(circle at 93% 14%, #7dd3fc 0 76px, transparent 155px),
    radial-gradient(circle at 13% 91%, #f0abfc 0 80px, transparent 160px),
    radial-gradient(circle at 91% 88%, #86efac 0 74px, transparent 152px),
    linear-gradient(135deg,#eef2ff,#fff7ed 52%,#ecfeff);
}
.game{
  width:min(420px,calc(100vw - 16px));
  height:min(720px,calc(100svh - 54px));
  min-height:640px;
  background:rgba(255,255,255,.97);
  border:1px solid rgba(255,255,255,.86);
  border-radius:32px;
  overflow:hidden;
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
  display:grid;
  grid-template-rows:70px 42px 76px 1fr 58px;
}
.header{
  padding:12px 15px 10px;
  color:white;
  background:
    radial-gradient(circle at 10% 14%,rgba(255,255,255,.22),transparent 40%),
    linear-gradient(135deg,#0f172a,#3730a3 54%,#be185d);
}
.titlebar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
h1{margin:0;font-size:25px;line-height:.94;font-weight:1000;letter-spacing:-.06em}
.scorebar{display:flex;gap:6px;align-items:center}
.stat{
  min-width:43px;
  padding:5px 6px 6px;
  border-radius:15px;
  text-align:center;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
}
.stat b{display:block;font-size:18px;line-height:1;font-weight:1000;font-variant-numeric:tabular-nums}
.stat span{display:block;margin-top:3px;font-size:8.5px;line-height:1.1;text-transform:uppercase;letter-spacing:.08em;font-weight:950;color:#dbeafe}
.iconBtn{
  border:0;background:rgba(255,255,255,.14);color:white;width:32px;height:32px;border-radius:13px;
  font-size:16px;font-weight:1000;cursor:pointer;
}
.iconBtn:hover{background:rgba(255,255,255,.24)}
.modebar{
  padding:7px 14px;
  background:linear-gradient(180deg,#fff,#f8fafc);
  border-bottom:1px solid var(--line);
  display:flex;
  gap:7px;
  align-items:center;
}
.modeBtn{
  height:28px;
  border:0;
  border-radius:999px;
  padding:0 12px;
  background:#eef2ff;
  color:#3730a3;
  font-weight:1000;
  font-size:12px;
  cursor:pointer;
  white-space:nowrap;
}
.modeBtn.active{background:#111827;color:white;box-shadow:0 7px 16px rgba(17,24,39,.16)}
.instructions{
  padding:10px 15px 11px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#fff,#f8fafc);
}
.instructions b{display:block;font-size:15.5px;letter-spacing:-.02em;line-height:1.1;color:#111827}
.instructions span{display:block;margin-top:6px;font-size:12.5px;line-height:1.25;color:#64748b;font-weight:850}
.play{

  display:grid;
  grid-template-rows:62px 116px calc(var(--tile) + var(--tile) + 34px) 42px;
  gap:8px;
}
.goalCard{
  height:62px;
  border-radius:23px;
  border:1px solid var(--line);
  background:#fff;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:7px;
  overflow:hidden;
}
.goalBlock{
  min-width:0;
  height:46px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:6px 8px;

}
.goalBlock.current{background:linear-gradient(135deg,#fff7ed,#fdf2f8)}
.goalBlock.good{background:linear-gradient(135deg,#ecfdf5,#dcfce7);border-color:#bbf7d0}
.goalBlock.bad{background:linear-gradient(135deg,#fff1f2,#ffe4e6);border-color:#fecdd3}
.goalText{min-width:0}
.goalText b{display:block;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:#94a3b8;font-weight:1000;line-height:1}
.goalText span{display:block;margin-top:4px;font-size:14px;color:#334155;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums}
.shapeMini{width:54px;height:44px;display:grid;place-items:center;flex:0 0 54px}
.boardCard{
  height:116px;
  border-radius:28px;
  border:1px solid var(--line);
  background:
    radial-gradient(circle at 11% 18%,rgba(99,102,241,.10),transparent 36%),
    radial-gradient(circle at 91% 84%,rgba(236,72,153,.10),transparent 38%),

.slot.empty{border:2px dashed #cbd5e1;background:linear-gradient(180deg,rgba(255,255,255,.88),rgba(241,245,249,.94))}
.slot.empty::after{content:"";width:43px;height:31px;border-radius:10px;border:3px solid #dbe2ea;border-left-width:5px;border-right-width:5px;opacity:.78}
.operator{
  width:30px;height:58px;flex:0 0 30px;display:grid;place-items:center;border-radius:16px;
  color:#94a3b8;background:rgba(255,255,255,.62);border:1px solid #e2e8f0;position:relative;
}
.operator .times{font-size:25px;font-weight:1000;line-height:1;transform:translateY(-2px)}
.operator .mark{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:17px;height:17px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:1000;color:white;background:#cbd5e1;opacity:0}
.operator.good{color:#16a34a;background:#ecfdf5;border-color:#bbf7d0}.operator.good .mark{background:var(--green);opacity:1}
.operator.bad{color:#dc2626;background:#fff1f2;border-color:#fecdd3}.operator.bad .mark{background:var(--red);opacity:1}
.trayCard{
  height:calc(var(--tile) + var(--tile) + 34px);
  min-height:0;
  border-radius:28px;
  padding:12px;
  border:1px solid var(--line);
  background:#fff;
  display:grid;
  grid-template-columns:repeat(3,var(--tile));
  grid-auto-rows:var(--tile);
  place-content:center;
  gap:10px 12px;
  overflow:hidden;
}
.trayGhost{width:var(--tile);height:var(--tile);border-radius:22px;background:linear-gradient(180deg,#f8fafc,#eef2f7);border:1px dashed #dbe4ef}

.trayCard.repairMode{
  grid-template-columns:1fr;
  grid-auto-rows:1fr;
  place-content:stretch;
  padding:12px;
}
.repairGuide{
  width:100%;height:100%;display:grid;place-items:center;pointer-events:none;
}
.repairNote{
  width:100%;height:100%;border-radius:22px;border:1px dashed #cbd5e1;
  background:
    radial-gradient(circle at 12% 20%,rgba(59,130,246,.10),transparent 38%),
    radial-gradient(circle at 91% 85%,rgba(236,72,153,.10),transparent 40%),
    linear-gradient(135deg,#f8fafc,#fff);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:10px 12px;color:#334155;
}
.repairTitle{
  display:inline-flex;align-items:center;justify-content:center;height:24px;padding:0 12px;border-radius:999px;
  background:#111827;color:white;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:1000;

}
.repairChoices{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;font-size:12px;font-weight:950;line-height:1.05;color:#334155}
.repairChip{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.repairChip b{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:10px;background:#eef2ff;color:#3730a3;font-size:15px;line-height:1;font-weight:1000}
.repairOr{font-size:10px;color:#94a3b8;font-weight:1000;text-transform:uppercase;letter-spacing:.08em}

.hintBox{
  height:42px;width:100%;border:0;border-radius:21px;padding:0 13px;cursor:pointer;color:#1e3a8a;
  background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #dbeafe;
  display:flex;align-items:center;justify-content:center;gap:8px;font-weight:1000;font-size:13px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
}
.hintBox .hintLabel{display:inline-flex;align-items:center;justify-content:center;width:44px;height:24px;border-radius:999px;background:#2563eb;color:white;font-size:11px;letter-spacing:.06em;text-transform:uppercase;flex:0 0 44px}

.hint-on .hintBox .hintReveal{display:block}
.footer{height:58px;padding:8px 14px 12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border-top:1px solid var(--line);background:linear-gradient(180deg,#fff,#f8fafc)}
.message{min-width:0;font-size:13px;line-height:1.18;color:#475569;font-weight:900}.message.good{color:#15803d}.message.bad{color:#dc2626}.message.note{color:#2563eb}
.checkBtn{border:0;border-radius:999px;padding:11px 18px;background:#111827;color:#fff;font-size:14px;font-weight:1000;cursor:pointer;box-shadow:0 9px 20px rgba(17,24,39,.16)}
.checkBtn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.tile{
  width:var(--tile);height:var(--tile);aspect-ratio:1 / 1;border:0;border-radius:22px;position:relative;overflow:hidden;cursor:pointer;user-select:none;color:white;
  box-shadow:0 5px 12px rgba(15,23,42,.18), inset 0 1px 0 rgba(255,255,255,.24);
  transform:translateZ(0);transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;perspective:600px;
}
.tile:hover{transform:translateY(-1px);filter:saturate(1.06)}.tile:active{transform:translateY(0) scale(.986)}

.tileLabel{position:absolute;left:8px;right:27px;top:7px;text-align:left;font-weight:1000;font-size:16px;line-height:1;color:rgba(255,255,255,.98);text-shadow:0 1px 4px rgba(0,0,0,.24);z-index:3;pointer-events:none}

.transposeCorner:hover{background:rgba(255,255,255,.44)}.tile.transposed .transposeCorner{background:rgba(17,24,39,.28)}
.matrixBox{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);width:63px;height:46px;display:flex;align-items:center;justify-content:center;gap:4px;z-index:2;transform-style:preserve-3d;pointer-events:none}
.tile.pulse .matrixBox{animation:transposeFlip .40s ease both}

.diagLine{position:absolute;left:50%;top:50%;width:82px;height:0;border-top:2px dashed rgba(255,255,255,.9);transform:translate(-50%,-50%) rotate(-45deg);opacity:0;z-index:4;pointer-events:none}.tile.pulse .diagLine{animation:diagFlash .40s ease}@keyframes diagFlash{0%,100%{opacity:0}20%,75%{opacity:1}}
.bracket{height:41px;width:7px;border-top:2.6px solid rgba(255,255,255,.97);border-bottom:2.6px solid rgba(255,255,255,.97);flex:0 0 7px}.bracket.left{border-left:2.6px solid rgba(255,255,255,.97)}.bracket.right{border-right:2.6px solid rgba(255,255,255,.97)}
.dots{width:38px;height:38px;display:grid;grid-template-columns:repeat(var(--c),1fr);grid-template-rows:repeat(var(--r),1fr);gap:1.5px;place-items:center}.dots i{display:block;width:5.3px;height:5.3px;border-radius:50%;background:rgba(255,255,255,.95);box-shadow:0 1px 2px rgba(0,0,0,.14)}

.shapeViz{display:flex;align-items:center;justify-content:center;gap:3px;width:54px;height:42px}.shapeViz .bracket{height:36px;border-color:#475569}.shapeViz .dots{width:31px;height:31px;gap:1.5px}.shapeViz .dots i{width:4.4px;height:4.4px;background:#475569;box-shadow:none}.shapeViz.muted .bracket{border-color:#cbd5e1}.shapeViz.muted .dots i{background:#cbd5e1}.goalBlock.good .shapeViz .bracket{border-color:#15803d}.goalBlock.good .shapeViz .dots i{background:#15803d}.goalBlock.bad .shapeViz .bracket{border-color:#dc2626}.goalBlock.bad .shapeViz .dots i{background:#dc2626}

<body>
<div id="game" class="game">

  </nav>

  </section>

  <main id="playArea" class="play">

      </div>

        <div id="currentPreview" class="shapeMini"></div>
      </div>
    </section>

    </section>

<script>
const COLORS = [
  ['#ff6b6b','#f97316'], ['#2563eb','#06b6d4'], ['#7c3aed','#ec4899'],
  ['#059669','#84cc16'], ['#f59e0b','#ef4444'], ['#0f766e','#22c55e'],
  ['#4f46e5','#8b5cf6'], ['#db2777','#f97316']
];
const LETTERS = ['A','B','C','D','E','F','G','H'];
const LEVELS = {
  basic: {label:'Basic', chainLength:2, kind:'build', headline:'Hit the target shape.', instruction:'Choose two tiles. The product must work, and the outside shape must hit the target. Click ↙ to transpose.', startMessage:'Choose two tiles.'},
  ch1: {label:'Challenge 1', chainLength:3, kind:'repair', headline:'Repair the broken product.', instruction:'A broken product is filled in. Exactly one move fixes it: click a tile’s ↙ arrow to transpose it, or tap two product tiles to swap them.', startMessage:'One move: transpose one tile or swap two product tiles.'},
  ch2: {label:'Challenge 2', chainLength:3, kind:'build', headline:'Hit the target shape.', instruction:'Choose three tiles. Every product sign must obey the shape rule, and the outside shape must hit the target. Click ↙ to transpose.', startMessage:'Build a chain of three matrices.'}
};
let state;
let timerId = null;
let nextRoundTimer = null;
let lastFlip = {id:null, at:0};
const START_TIME_MS = Date.now();
let rngState = (START_TIME_MS ^ (START_TIME_MS >>> 16) ^ 0x9e3779b9) >>> 0;
let sessionSignatures = new Set();

function rng(){
  // Seeded from the current date/time in milliseconds at page load.
  // This avoids persistent storage while making repeated rollouts very unlikely.
  rngState = (rngState + 0x6D2B79F5) >>> 0;
  let t = rngState;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
function rememberSignature(sig){ if(sig) sessionSignatures.add(sig); }

function randInt(a,b){ return a + Math.floor(rng()*(b-a+1)); }
function choice(arr){ return arr[Math.floor(rng()*arr.length)]; }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function sameShape(a,b){ return a && b && a.r === b.r && a.c === b.c; }
function shape(tile){ return tile.t ? {r:tile.c, c:tile.r} : {r:tile.r, c:tile.c}; }
function validPair(left,right){ return shape(left).c === shape(right).r; }
function level(){ return LEVELS[state.level]; }
function chainLength(){ return level().chainLength; }
function chainTiles(){ return state.slots.map(id => state.tiles.find(t => t.id === id)); }
function chainFull(){ return state.slots.every(Boolean); }
function chainValid(){
  const ts = chainTiles();
  if(!ts.every(Boolean)) return false;
  for(let i=0;i<ts.length-1;i++) if(!validPair(ts[i],ts[i+1])) return false;
  return true;
}
function productShape(){ if(!chainValid()) return null; const ts=chainTiles().map(shape); return {r:ts[0].r, c:ts[ts.length-1].c}; }
function solved(){ const p=productShape(); return !!p && sameShape(p,state.target); }
function roundId(){ return Math.floor(rng()*0xFFFFFFFF).toString(36).padStart(7,'0').slice(0,7); }
function makeTile(id, r, c, name, colorIndex, t=false){ return {id, r, c, name, colorIndex, t, pulse:false}; }
function shapeText(s){ return `${s.r} × ${s.c}`; }
function moveCountText(){ return `${state.moves} move${state.moves===1?'':'s'}`; }
function tileSignature(t){
  if(!t) return '_';
  return `${t.name}:${t.r}x${t.c}:${t.t?'T':'N'}`;
}
function currentRoundSignature(){
  if(!state || !state.target) return '';
  const tray = state.tiles.map(tileSignature).join(',');
  const slots = state.slots.map(id => tileSignature(state.tiles.find(t => t.id === id))).join('>');
  return `${state.level}|target=${state.target.r}x${state.target.c}|tiles=${tray}|slots=${slots}|repair=${state.repairType||''}`;
}

function generateDims(n){
  const d = Array.from({length:n+1}, () => randInt(1,6));
  if(d.every(x => x === d[0])) d[1] = d[1] === 6 ? 5 : d[1] + 1;
  return d;
}
function generateBuildRound(){
  const n = chainLength();
  const d = generateDims(n);
  state.target = {r:d[0], c:d[n]};
  const id = roundId();
  const tiles = [];
  const flipChance = state.level === 'basic' ? 0.25 : 0.42;
  const flippable = [];
  for(let i=0;i<n;i++) if(d[i] !== d[i+1]) flippable.push(i);
  const mustFlip = (flippable.length && rng() < flipChance) ? choice(flippable) : -1;
  for(let i=0;i<n;i++){
    if(i === mustFlip){ tiles.push(makeTile(id+'s'+i, d[i+1], d[i], LETTERS[i], i, false)); }
    else{ tiles.push(makeTile(id+'s'+i, d[i], d[i+1], LETTERS[i], i, false)); }
  }
  while(tiles.length < 6){
    const i = tiles.length;
    let r,c,tries=0;
    do{ r=randInt(1,6); c=randInt(1,6); tries++; }
    while(tries < 25 && tiles.some(t => sameShape(shape(t), {r,c})));
    tiles.push(makeTile(id+'x'+i, r, c, LETTERS[i], i, rng()<.18));
  }
  state.tiles = shuffle(tiles);
  state.slots = Array(n).fill(null);
  state.selectedSlot = null;
  state.moves = 0;
  state.message = level().startMessage;
  state.messageKind = '';
  state.flashBoard = '';
  state.roundSolved = false;
}
function makeDecoy(id, name, colorIndex, avoidShapes=[]){
  let r,c,tries=0;
  do{ r=randInt(1,6); c=randInt(1,6); tries++; }
  while(tries < 80 && avoidShapes.some(s => sameShape(s,{r,c}) || sameShape(s,{r:c,c:r})));
  return makeTile(id,r,c,name,colorIndex,rng()<.18);
}
function generateRepairRound(){
  const n = 3;
  let made = false;
  for(let attempt=0; attempt<300 && !made; attempt++){
    const d = generateDims(n);
    const id = roundId();
    const sol = [
      makeTile(id+'s0', d[0], d[1], 'A', 0),
      makeTile(id+'s1', d[1], d[2], 'B', 1),
      makeTile(id+'s2', d[2], d[3], 'C', 2)
    ];
    const slots = sol.map(t=>t.id);
    let repair = choice(['transpose','swap']);

    if(repair === 'transpose'){
      const choices = sol.map((t,i)=>({t,i})).filter(x => x.t.r !== x.t.c);
      if(!choices.length) repair = 'swap';
      else choice(choices).t.t = true;
    }
    if(repair === 'swap'){
      const [i,j] = choice([[0,1],[1,2],[0,2]]);
      [slots[i], slots[j]] = [slots[j], slots[i]];
    }

    state.target = {r:d[0], c:d[n]};
    state.tiles = sol;
    state.slots = slots;
    state.repairType = repair;
    made = !solved();
  }
  if(!made){
    const id = roundId();
    state.target = {r:2, c:5};
    state.tiles = [makeTile(id+'s0',2,3,'A',0), makeTile(id+'s1',4,3,'B',1,true), makeTile(id+'s2',4,5,'C',2)];
    state.slots = state.tiles.map(t=>t.id);
    state.repairType = 'transpose';
  }
  state.selectedSlot = null;
  state.moves = 0;
  state.message = level().startMessage;
  state.messageKind = '';
  state.flashBoard = '';
  state.roundSolved = false;
}
function generateRound(){
  let sig = '';
  for(let attempt=0; attempt<120; attempt++){
    if(level().kind === 'repair') generateRepairRound();
    else generateBuildRound();
    sig = currentRoundSignature();
    if(!sessionSignatures.has(sig)){
      rememberSignature(sig);
      return;
    }
  }
  // The shape space is finite, so after many attempts accept the best available round.
  rememberSignature(sig || currentRoundSignature());
}
function resetGame(keepLevel=false){
  if(nextRoundTimer){ clearTimeout(nextRoundTimer); nextRoundTimer = null; }
  const nextLevel = keepLevel && state ? state.level : 'basic';
  state = {level:nextLevel, tiles:[], slots:[], target:null, score:0, streak:0, mistakes:0, time:60, hint:false, gameOver:false, roundSolved:false, message:'', messageKind:'', flashBoard:'', selectedSlot:null, moves:0};
  generateRound();
  if(timerId) clearInterval(timerId);
  timerId = setInterval(tick, 1000);
  render();
}
function switchLevel(nextLevel){
  if(state.level === nextLevel) return;
  if(nextRoundTimer){ clearTimeout(nextRoundTimer); nextRoundTimer = null; }
  state.level = nextLevel;
  state.score = 0; state.streak = 0; state.mistakes = 0; state.time = 60; state.gameOver = false; state.hint = false; state.roundSolved = false; state.selectedSlot = null; state.moves = 0;
  generateRound();
  if(timerId) clearInterval(timerId);
  timerId = setInterval(tick, 1000);
  render();
}
function tick(){
  if(!state || state.gameOver) return;
  state.time -= 1;
  if(state.time <= 0){
    state.time = 0; state.gameOver = true;
    state.message = state.score ? `Time. You hit ${state.score} target${state.score===1?'':'s'}.` : 'Time. Try one clean chain.';
    state.messageKind = state.score ? 'good' : 'bad';
  }
  render();
}
function dotsHTML(r,c){ return Array.from({length:r*c}, () => '<i></i>').join(''); }
function shapeHTML(s, muted=false){
  if(!s) return `<div class="shapeViz muted"><span class="bracket left"></span><span class="dots" style="--r:1;--c:1"><i></i></span><span class="bracket right"></span></div>`;
  return `<div class="shapeViz ${muted?'muted':''}"><span class="bracket left"></span><span class="dots" style="--r:${s.r};--c:${s.c}">${dotsHTML(s.r,s.c)}</span><span class="bracket right"></span></div>`;
}
function labelText(tile){ return tile.name + (tile.t ? 'ᵀ' : ''); }
function tileHTML(tile, location, slotIndex=null, selected=false){
  const s = shape(tile);
  const [c1,c2] = COLORS[tile.colorIndex % COLORS.length];
  const label = labelText(tile);
  const aria = `${label}, ${s.r} rows by ${s.c} columns`;
  return `
    <div class="tile ${tile.t?'transposed':''} ${tile.pulse?'pulse':''} ${selected?'selected':''}" style="background:linear-gradient(135deg,${c1},${c2});" role="button" tabindex="0" data-id="${tile.id}" data-loc="${location}" ${slotIndex!==null ? `data-slot="${slotIndex}"` : ''} aria-label="${aria}">
      <div class="tileLabel">${label}</div>
      <button class="transposeCorner" data-flip="${tile.id}" title="Transpose ${tile.name}" aria-label="Transpose ${tile.name}" type="button"></button>
      <span class="diagLine" aria-hidden="true"></span>
      <div class="matrixBox" aria-hidden="true">
        <span class="bracket left"></span>
        <span class="dots" style="--r:${s.r};--c:${s.c}">${dotsHTML(s.r,s.c)}</span>
        <span class="bracket right"></span>
      </div>
      <div class="shapeCaption" aria-hidden="true">${shapeText(s)}</div>
    </div>`;
}
function operatorHTML(i){
  const left = state.tiles.find(t=>t.id===state.slots[i]);
  const right = state.tiles.find(t=>t.id===state.slots[i+1]);
  let cls = '';
  const showJoinStatus = left && right && (level().kind !== 'repair' || state.roundSolved);
  if(showJoinStatus){
    const ok = validPair(left,right);
    cls = ok ? 'good' : 'bad';
  }
  return `<div class="operator ${cls}" aria-label="matrix multiplication sign"><span class="times">×</span><span class="mark"></span></div>`;
}
function renderBoard(){
  const board = document.getElementById('board');
  let html = '';
  const n = chainLength();
  for(let i=0;i<n;i++){
    const id = state.slots[i];
    if(id){
      const tile = state.tiles.find(t=>t.id===id);
      html += `<div class="slot">${tileHTML(tile,'slot',i,state.selectedSlot===i)}</div>`;
    } else html += `<div class="slot empty" data-empty-slot="${i}" aria-label="empty slot ${i+1}"></div>`;
    if(i<n-1) html += operatorHTML(i);
  }
  board.innerHTML = html;
}
function renderTray(){
  const tray = document.getElementById('tray');
  if(level().kind === 'repair'){
    tray.classList.add('repairMode');
    tray.innerHTML = '';
    return;
  }
  tray.classList.remove('repairMode');
  const used = new Set(state.slots.filter(Boolean));
  const free = state.tiles.filter(t => !used.has(t.id));
  let html = free.map(t => tileHTML(t,'tray')).join('');
  let count = free.length;
  while(count++ < 6) html += '<div class="trayGhost"></div>';
  tray.innerHTML = html;
}
function renderGoal(){
  document.getElementById('targetPreview').innerHTML = shapeHTML(state.target);
  document.getElementById('targetText').textContent = shapeText(state.target);
  const p = productShape();
  const currentBlock = document.getElementById('currentBlock');
  currentBlock.className = 'goalBlock current';
  if(level().kind === 'repair'){
    if(state.roundSolved && p){
      currentBlock.classList.add('good');
      document.getElementById('currentPreview').innerHTML = shapeHTML(p);
      document.getElementById('currentText').textContent = shapeText(p);
    }else{
      document.getElementById('currentPreview').innerHTML = shapeHTML(null, true);
      document.getElementById('currentText').textContent = state.moves ? 'hidden' : 'hidden';
    }
    return;
  }
  document.getElementById('currentPreview').innerHTML = p ? shapeHTML(p) : shapeHTML(null, true);
  if(p){
    const good = sameShape(p, state.target);
    currentBlock.classList.add(good ? 'good' : 'bad');
    document.getElementById('currentText').textContent = shapeText(p);
  }else{
    document.getElementById('currentText').textContent = chainFull() ? 'blocked' : '—';
  }
}
function renderModes(){
  document.getElementById('basicBtn').classList.toggle('active', state.level === 'basic');
  document.getElementById('challenge1Btn').classList.toggle('active', state.level === 'ch1');
  document.getElementById('challenge2Btn').classList.toggle('active', state.level === 'ch2');
  document.getElementById('headline').textContent = level().headline;
  document.getElementById('instructionText').textContent = level().instruction;
  const isRepair = level().kind === 'repair';
  const play = document.getElementById('playArea');
  const banner = document.getElementById('repairBanner');
  play.classList.toggle('repairPlay', isRepair);
  document.getElementById('game').classList.toggle('repair-active', isRepair);
  banner.hidden = !isRepair;
}
function render(){
  const game = document.getElementById('game');
  game.classList.toggle('hint-on', state.hint);
  document.getElementById('hintBtn').setAttribute('aria-expanded', state.hint ? 'true' : 'false');
  document.getElementById('time').textContent = state.time;
  document.getElementById('score').textContent = state.score;
  document.getElementById('streak').textContent = state.streak;
  renderModes(); renderGoal(); renderBoard(); renderTray();
  const message = document.getElementById('message');
  message.textContent = state.message;
  message.className = 'message ' + (state.messageKind || '');
  document.getElementById('checkBtn').disabled = state.gameOver;
  if(state.flashBoard){
    const card = document.getElementById('boardCard');
    card.classList.add(state.flashBoard);
    setTimeout(()=>{ card.classList.remove('shake','flash'); }, 330);
    state.flashBoard = '';
  }
}
function queueNextRound(){
  if(nextRoundTimer) clearTimeout(nextRoundTimer);
  nextRoundTimer = setTimeout(()=>{
    if(!state.gameOver){ generateRound(); render(); }
  }, 650);
}
function markSolved(message){
  if(state.roundSolved) return true;
  state.roundSolved = true;
  state.score += 1;
  state.streak += 1;
  state.message = message;
  state.messageKind = 'good';
  state.flashBoard = 'flash';
  queueNextRound();
  return true;
}
function markWrong(message){
  state.mistakes += 1;
  state.streak = 0;
  state.message = message;
  state.messageKind = 'bad';
  state.flashBoard = 'shake';
  return false;
}
function evaluateAfterAction(){
  if(state.gameOver || state.roundSolved) return false;
  if(level().kind === 'repair'){
    if(state.moves !== 1) return false;
    if(solved()) return markSolved('Fixed. Nice repair.');
    return markWrong('Not fixed. The repaired product still fails the shape rule or misses the target. Press ↻ for a new puzzle.');
  }
  if(!chainFull()) return false;
  if(solved()) return markSolved('Nice. The product works and hits the target.');
  return markWrong(diagnose());
}

function cleanupPulse(tile){ setTimeout(()=>{ tile.pulse=false; render(); }, 420); }
function buildPlaceTile(id){
  if(state.gameOver || state.roundSolved) return;
  const firstEmpty = state.slots.findIndex(x => !x);
  if(firstEmpty === -1){ state.message = 'Chain is full. Tap a placed tile to remove it.'; state.messageKind='note'; render(); return; }
  state.slots[firstEmpty] = id;
  state.message = chainFull() ? 'Reading the product...' : 'Add the next tile.';
  state.messageKind = '';
  evaluateAfterAction();
  render();
}
function buildRemoveSlot(index){
  if(state.gameOver || state.roundSolved) return;
  state.slots[index] = null;
  state.message = 'Rebuild the chain.';
  state.messageKind = '';
  render();
}
function repairSlotTap(index){
  if(state.gameOver || state.roundSolved) return;
  if(state.moves >= 1){
    state.message = 'One move only. Press ↻ for a new puzzle.';
    state.messageKind = 'note';
    render();
    return;
  }
  if(state.selectedSlot === null){
    state.selectedSlot = index;
    state.message = 'Tap one more product tile to swap. Or click ↙ to transpose one tile.';
    state.messageKind = 'note';
  }else if(state.selectedSlot === index){
    state.selectedSlot = null;
    state.message = 'Selection cleared. One move: transpose one tile or swap two product tiles.';
    state.messageKind = '';
  }else{
    [state.slots[state.selectedSlot], state.slots[index]] = [state.slots[index], state.slots[state.selectedSlot]];
    state.moves += 1;
    state.selectedSlot = null;
    state.message = 'Swapped two tiles.';
    state.messageKind = 'note';
    evaluateAfterAction();
  }
  render();
}
function repairTrayTap(id){
  if(state.gameOver || state.roundSolved) return;
  state.selectedSlot = null;
  state.message = 'No spare tiles in Challenge 1. Use exactly one move: transpose one product tile or swap two product tiles.';
  state.messageKind = 'note';
  render();
}
function toggleTranspose(id){
  if(state.gameOver || state.roundSolved) return;
  if(level().kind === 'repair' && state.moves >= 1){
    state.message = 'One move only. Press ↻ for a new puzzle.';
    state.messageKind = 'note';
    render();
    return;
  }
  const now = performance.now();
  if(lastFlip.id === id && now - lastFlip.at < 350) return;
  lastFlip = {id, at:now};
  const tile = state.tiles.find(t=>t.id===id);
  if(!tile) return;
  tile.t = !tile.t;
  tile.pulse = true;
  if(level().kind === 'repair'){
    state.moves += 1;
    state.selectedSlot = null;
    state.message = `${labelText(tile)} swapped rows and columns.`;
  }else{
    state.message = `${labelText(tile)} swapped rows and columns.`;
  }
  state.messageKind = 'note';
  evaluateAfterAction();
  render(); cleanupPulse(tile);
}
function diagnose(){
  const ts=chainTiles();
  if(!ts.every(Boolean)) return `Fill all ${chainLength()} slots first.`;
  if(level().kind === 'repair'){
    return 'Not fixed yet. The product still fails a shape rule or misses the target shape.';
  }
  for(let i=0;i<ts.length-1;i++){
    const a=shape(ts[i]).c, b=shape(ts[i+1]).r;
    if(a!==b) return `Break at × ${i+1}: ${a} columns meet ${b} rows.`;
  }
  const p = productShape();
  if(p && !sameShape(p,state.target)) return `Product works, but its outside shape is ${shapeText(p)}, not ${shapeText(state.target)}.`;
  return '';
}
function check(){
  if(state.gameOver || state.roundSolved) return;
  if(!chainFull()){
    state.message=`Fill all ${chainLength()} slots first.`; state.messageKind='bad'; state.flashBoard='shake'; render(); return;
  }
  if(solved()){
    if(level().kind === 'repair' && state.moves === 0){
      state.message='Make exactly one move first: transpose one product tile or swap two product tiles.'; state.messageKind='bad'; state.flashBoard='shake'; render(); return;
    }
    state.score += 1; state.streak += 1;
    state.message = level().kind === 'repair' ? 'Fixed in one move.' : 'Nice. The product works and hits the target.';
    state.messageKind='good'; state.flashBoard='flash'; render();
    setTimeout(()=>{ if(!state.gameOver){ generateRound(); render(); }}, 720);
  }else{
    state.mistakes += 1; state.streak = 0;
    state.message=diagnose();
    if(level().kind === 'repair' && state.moves > 0) state.message += ' Restart for a new one, or press ↻ to try again.';
    state.messageKind='bad'; state.flashBoard='shake'; render();
  }
}
function handleTileAction(el){
  const id = el.dataset.id;
  const loc = el.dataset.loc;
  if(level().kind === 'repair'){
    if(loc === 'slot') repairSlotTap(Number(el.dataset.slot));
    if(loc === 'tray') repairTrayTap(id);
  }else{
    if(loc === 'tray') buildPlaceTile(id);
    if(loc === 'slot') buildRemoveSlot(Number(el.dataset.slot));
  }
}
document.addEventListener('click', (e)=>{
  const flip = e.target.closest('[data-flip]');
  if(flip){ e.preventDefault(); e.stopPropagation(); toggleTranspose(flip.dataset.flip); return; }
  const tile = e.target.closest('.tile');
  if(tile){ handleTileAction(tile); return; }
});
document.addEventListener('keydown', (e)=>{
  if((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('tile')){ e.preventDefault(); handleTileAction(e.target); }
});
document.getElementById('checkBtn').addEventListener('click', check);
document.getElementById('hintBtn').addEventListener('click', ()=>{ state.hint = !state.hint; state.message = state.hint ? 'Hint on: shapes appear under the matrices.' : 'Hint hidden.'; state.messageKind = state.hint ? 'note' : ''; render(); });
document.getElementById('resetBtn').addEventListener('click', ()=>resetGame(true));
document.getElementById('basicBtn').addEventListener('click', ()=>switchLevel('basic'));
document.getElementById('challenge1Btn').addEventListener('click', ()=>switchLevel('ch1'));
document.getElementById('challenge2Btn').addEventListener('click', ()=>switchLevel('ch2'));
resetGame();
</script>
</body>
</html>
